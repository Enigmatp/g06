<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G05</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <!-- Top Bar for Resources -->
        <div class="top-bar">
            <!-- Phase Info (Bar removed, only text) -->
            <div class="phase-container">
                <div id="phase-text" class="phase-text">☀️ 第 1 天</div>
            </div>
        </div>

        <!-- Entities Layer covering everything -->
        <div id="entities-layer"></div>

        <!-- 上半屏：战斗表现区 -->
        <div class="battle-area" id="battle-area">
            <!-- 所有战斗实体(怪物、己方兵、投射物)都会放置在这里 -->

            <!-- 城墙与血条（下边界） -->
            <div class="wall-line">
                <div class="wall-hp-bg">
                    <div class="wall-hp-fill" id="wall-hp-fill"></div>
                </div>
            </div>
            <!-- 校场区域 (透明背景) -->
            <div class="camp-area"></div>
        </div>

        <!-- 下半屏：核心操作区 -->
        <div class="management-area" id="management-area">
            <div class="grid-container" id="grid">
                <!-- 7x7 格子将由 JS 动态生成 -->
            </div>

            <!-- 添加外层包装，用于控制战斗时隐藏 -->
            <div id="prep-ui" class="prep-ui">
                <div class="resource-bar">
                    <div class="left-controls" style="flex:1; display:flex; justify-content:flex-start;">
                        <button id="refresh-shop-btn" class="refresh-btn">刷新 (2 ⚡)</button>
                    </div>
                    <div class="center-controls" style="flex:1; display:flex; justify-content:center;">
                        <button id="start-wave-btn" class="start-btn">开始战斗</button>
                    </div>
                    <div class="right-controls" style="flex:1; display:flex; justify-content:flex-end;">
                        <div class="elixir-info">
                            <span class="elixir-icon">⚡</span>
                            <span id="energy-number" class="elixir-number">0</span>
                        </div>
                    </div>
                </div>

                <div class="action-area" id="action-area">
                    <!-- Shop Container (Visible in Prep Phase) -->
                    <div class="shop-wrapper" id="shop-wrapper">
                        <div class="shop-controls">
                            <div id="sell-zone" class="sell-zone">💰卖出</div>
                        </div>
                        <div class="hand-cards-container" id="hand-cards">
                            <!-- Cards are dynamically injected via JS -->
                        </div>
                    </div>
                </div>
            </div> <!-- 修复了未正确闭合的 prep-ui -->

            <!-- 战斗阶段 UI (DPS Panel) -->
            <div id="combat-ui" class="combat-ui">
                <div id="dps-panel" class="dps-panel">
                    <div class="dps-header">实时 DPS</div>
                    <div id="dps-list" class="dps-list">
                        <!-- Bars generated via JS -->
                    </div>
                </div>
            </div>

        </div>

        <!-- Night Choice Modal -->
        <div id="night-choice-overlay" class="choice-overlay hidden">
            <div class="choice-modal">
                <h2>夜间奖励 - 3选1</h2>
                <div id="choice-options" class="choice-options">
                    <!-- Dynamically injected -->
                </div>
            </div>
        </div>

        <!-- 拖拽时的幽灵元素容器 -->
        <div id="drag-ghost" class="drag-ghost hidden"></div>

        <script src="main.js"></script>
</body>

</html>
