<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>King's Gaze - Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <!-- Top Bar for Resources -->
        <div class="top-bar">
            <div class="gold-container">
                储备: <span id="gold-display" class="gold-text">50</span> 💰
            </div>
            <!-- Phase Info (Bar) -->
            <div class="phase-container">
                <div id="phase-text" class="phase-text">☀️ 第 1 天</div>
                <div id="phase-bar-container" class="phase-bar-container">
                    <div id="phase-bar-fill" class="phase-bar-fill"></div>
                </div>
            </div>
        </div>

        <!-- Entities Layer covering everything -->
        <div id="entities-layer"></div>

        <!-- 上半屏：战斗表现区 -->
        <div class="battle-area" id="battle-area">
            <!-- 所有战斗实体(怪物、己方兵、投射物)都会放置在这里 -->

            <!-- 城墙与血条（下边界） -->
            <div class="wall-line">
                <div class="wall-hp-bg">
                    <div class="wall-hp-fill" id="wall-hp-fill"></div>
                </div>
            </div>
            <!-- 校场区域 (透明背景) -->
            <div class="camp-area"></div>
        </div>

        <!-- 下半屏：核心操作区 -->
        <div class="management-area" id="management-area">
            <div id="gaze-light" class="gaze-light hidden">
                <!-- Bottom Left: Drag Handle -->
                <div id="gaze-handle" class="gaze-handle">🖐️</div>
                <!-- Bottom Right: Rotate Button -->
                <button id="gaze-rotate" class="gaze-btn rotate-btn hidden">↻</button>
            </div>

            <div class="grid-container" id="grid">
                <!-- 7x7 格子将由 JS 动态生成 -->
            </div>

            <!-- 底部购买槽 -->
            <div class="shop-bar">
                <button id="btn-spin-slot" class="buy-btn">
                    <span class="icon">�</span>
                    <span class="name">祈愿</span>
                    <span class="price">10</span>
                </button>
                <button id="shop-gaze-upgrade" class="buy-btn special-btn">
                    <span class="icon">☀️</span>
                    <span class="name">凝视Lv.2</span>
                    <span class="price">10</span>
                </button>
            </div>

            <!-- Slot Machine Overlay -->
            <div id="slot-machine-overlay" class="slot-overlay hidden">
                <div class="slot-machine">
                    <div class="slot-title">🎰 祈愿中...</div>
                    <div id="slot-reels" class="slot-reels">
                        <!-- Slots injected via JS -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 拖拽时的幽灵元素容器 -->
    <div id="drag-ghost" class="drag-ghost hidden"></div>

    <script src="main.js"></script>
</body>

</html>
