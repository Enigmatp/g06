<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weapon Shop V1 and V2 Comparison</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0f172a;
            /* Slate 900 */
            color: #f1f5f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 10px;
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            height: calc(100vh - 40px);
            width: 100%;
        }

        .iframe-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        .iframe-wrapper:last-child {
            border-right: none;
        }

        .iframe-label {
            text-align: center;
            padding: 6px;
            background: #1e293b;
            font-weight: bold;
            font-size: 0.9rem;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="header">
        Weapon Shop Redesign: Dual Version View
    </div>

    <div class="container">
        <div class="iframe-wrapper">
            <div class="iframe-label">Version 1</div>
            <iframe src="v1/index.html"></iframe>
        </div>
        <div class="iframe-wrapper">
            <div class="iframe-label">Version 2</div>
            <iframe src="v2/index.html"></iframe>
        </div>
    </div>

</body>

</html>
